name: Auto-update Casks

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-casks:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Tap
        uses: actions/checkout@v4

      - name: Update all Casks
        run: |
          for cask_file in Casks/*.rb; do
            echo "--------------------------------"
            echo "Processing $cask_file..."
            
            # Extract the GitHub repo from a comment in the cask file
            # Requirement: Add a comment like: # github_repo: "user/repo"
            REPO=$(grep -E '# github_repo: ".*"' "$cask_file" | sed -E 's/.*"([^"]+)".*/\1/')
            
            if [ -z "$REPO" ]; then
              echo "No '# github_repo: \"user/repo\"' comment found in $cask_file, skipping."
              continue
            fi
            
            echo "Monitoring GitHub repo: $REPO"
            
            LATEST_JSON=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/$REPO/releases/latest")
            LATEST_VERSION=$(echo "$LATEST_JSON" | jq -r '.tag_name // empty' | sed 's/^v//')
            DOWNLOAD_URL=$(echo "$LATEST_JSON" | jq -r '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' | head -n 1)
            CURRENT_VERSION=$(grep -E 'version "[0-9.]+"' "$cask_file" | sed -E 's/.*"([0-9.]+)"/\1/')
            
            echo "Latest version: $LATEST_VERSION"
            echo "Current version: $CURRENT_VERSION"
            
            if [ -n "$LATEST_VERSION" ] && [ "$LATEST_VERSION" != "null" ] && \
               [ -n "$DOWNLOAD_URL" ] && [ "$DOWNLOAD_URL" != "null" ] && \
               [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
              
              echo "New version found! Downloading $DOWNLOAD_URL..."
              curl -L -o release.zip "$DOWNLOAD_URL"
              SHA256=$(shasum -a 256 release.zip | awk '{print $1}')
              
              echo "Updating version to $LATEST_VERSION and SHA256 to $SHA256"
              sed -i '' "s/version \".*\"/version \"$LATEST_VERSION\"/" "$cask_file"
              sed -i '' "s/sha256 \".*\"/sha256 \"$SHA256\"/" "$cask_file"
              rm release.zip
              
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add "$cask_file"
              git commit -m "Update $(basename $cask_file .rb) to v$LATEST_VERSION" || echo "No changes to commit for $cask_file"
            else
              echo "No update needed for $cask_file."
            fi
          done
          
          git push || echo "No changes to push to remote"
